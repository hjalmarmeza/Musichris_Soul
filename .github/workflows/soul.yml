name: MusiChris Soul Cloud Engine

on:
  repository_dispatch:
    types: [soul_trigger]

jobs:
  produce:
    runs-on: ubuntu-latest
    steps:
      - name: 🛰️ Sincronizando Código y Activos
        uses: actions/checkout@v4

      - name: 🛠️ Configurando Entorno Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: 📦 Instalando Dependencias
        run: npm install

      - name: 🎞️ Instalando FFmpeg Industrial
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: 🚀 EJECUTANDO PRODUCCIÓN MINISTERIAL
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          GOOGLE_TOKEN: ${{ secrets.GOOGLE_TOKEN }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node src/main.js --id=${{ github.event.client_payload.id }}

      - name: 📦 Guardando Resultado (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: soul-video-output
          path: output/
