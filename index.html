<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>MusiChris Soul | Master Control</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="assets/app_icon.png">
    <meta name="theme-color" content="#000000">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #000000;
            --accent-gold: #D4AF37;
            --gold-light: #F1D592;
            --glass: rgba(255, 255, 255, 0.05);
            --gold-glow: rgba(212, 175, 55, 0.4);
            --safe-top: env(safe-area-inset-top);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-deep);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            overflow-x: hidden;
        }

        .smoke-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: #000 url('assets/fondo_app.gif') center center no-repeat;
            background-size: cover;
            opacity: 0.5;
        }

        .container {
            width: 100%;
            max-width: 500px;
            padding: calc(var(--safe-top) + 1.5rem) 1.2rem 3rem;
            position: relative;
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
            position: relative;
        }

        /* --- LOGO VIA CSS (REFORZADO) --- */
        .logo-sphere {
            width: 100px;
            height: 100px;
            margin: 0 auto 1.2rem;
            border-radius: 28px;
            background-image: url('assets/app_icon.png');
            background-size: cover;
            background-position: center;
            background-color: #111;
            border: 2px solid var(--accent-gold);
            box-shadow: 0 0 25px var(--gold-glow);
            position: relative;
        }

        .btn-sync-action {
            position: absolute;
            top: 0;
            right: 0;
            width: 44px;
            height: 44px;
            background: var(--glass);
            border: 2px solid var(--accent-gold);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--accent-gold);
            box-shadow: 0 0 15px var(--gold-glow);
            backdrop-filter: blur(10px);
            z-index: 100;
        }

        .btn-sync-action.rotating { animation: spin 0.8s ease-in-out; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.4rem;
            margin: 0;
            letter-spacing: -0.5px;
        }

        .gold-glow-text {
            color: var(--accent-gold);
            text-shadow: 0 0 15px var(--gold-glow);
        }

        .version-tag {
            font-size: 0.6rem;
            letter-spacing: 4px;
            color: var(--accent-gold);
            margin-top: 0.4rem;
            font-weight: 800;
            opacity: 0.7;
        }

        /* --- STATS DYNAMIC --- */
        .mission-stats {
            display: flex;
            gap: 10px;
            margin-bottom: 2rem;
        }

        .stat-card {
            flex: 1;
            background: rgba(20, 20, 20, 0.8);
            backdrop-filter: blur(20px);
            padding: 1rem;
            border-radius: 20px;
            border: 1px solid rgba(212, 175, 55, 0.15);
            text-align: center;
        }

        .stat-card .val {
            display: block;
            font-size: 1.8rem;
            font-weight: 900;
            color: var(--accent-gold);
        }

        .stat-card .lab {
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            opacity: 0.5;
            font-weight: 700;
        }

        /* --- CATALOG --- */
        .catalog-container {
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(30px);
            border-radius: 28px;
            padding: 1.5rem;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .catalog-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 450px;
            overflow-y: auto;
            padding-right: 4px;
        }

        .entry-item {
            background: rgba(255,255,255,0.03);
            padding: 1.2rem;
            border-radius: 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.02);
            transition: 0.3s;
        }

        .entry-item:active { background: rgba(212, 175, 55, 0.05); }

        .entry-info h4 { margin: 0; font-size: 1rem; color: var(--accent-gold); }
        .entry-info p { margin: 4px 0 0; font-size: 0.75rem; opacity: 0.5; }

        .pub-status {
            font-size: 0.6rem;
            background: #111;
            border: 1px solid var(--accent-gold);
            color: var(--accent-gold);
            padding: 4px 8px;
            border-radius: 8px;
            font-weight: 900;
        }

        /* PRODUCTION ENGINE */
        #production-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 2000;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            padding: 2rem;
            text-align: center;
        }

        .loader-ring { width: 60px; height: 60px; border: 4px solid var(--glass); border-top-color: var(--accent-gold); border-radius: 50%; animation: spin 1s infinite linear; margin-bottom: 2rem; }
    </style>
</head>
<body>
    <div class="smoke-container"></div>
    <div class="container">
        <header>
            <div id="sync-icon" class="btn-sync-action" onclick="refreshData()">🔄</div>
            <div class="logo-sphere"></div>
            <h1>MusiChris <span class="gold-glow-text">Soul</span></h1>
            <div class="version-tag">MISSION CONTROL v40.2</div>
        </header>

        <div class="mission-stats">
            <div class="stat-card">
                <span class="val" id="count-promises">92</span>
                <span class="lab">Promesas Pendientes</span>
            </div>
            <div class="stat-card">
                <span class="val" id="count-landscapes">115</span>
                <span class="lab">Paisajes Libres</span>
            </div>
        </div>

        <section class="catalog-container">
            <h2 style="font-family: 'Playfair Display', serif; font-size: 1.4rem; margin: 0 0 1.2rem 0; font-style: italic;">Catálogo de Publicación</h2>
            <div class="catalog-list" id="main-list">
                <!-- Carga dinámica -->
            </div>
        </section>
    </div>

    <div id="production-screen">
        <div class="loader-ring"></div>
        <h2 style="font-family: 'Playfair Display', serif; color: var(--accent-gold);">Generando Materia Prima</h2>
        <p id="engine-sub" style="font-size: 0.7rem; opacity: 0.5; text-transform: uppercase; letter-spacing: 2px;">Iniciando Renderizado FFmpeg...</p>
    </div>

    <script>
        const DB_URL = "data/promises_developed.json";

        async function refreshData() {
            const icon = document.getElementById('sync-icon');
            icon.classList.add('rotating');
            await initApp();
            setTimeout(() => icon.classList.remove('rotating'), 800);
        }

        async function initApp() {
            try {
                const res = await fetch(DB_URL + '?v=' + Date.now());
                const data = await res.json();
                
                const list = document.getElementById('main-list');
                list.innerHTML = '';
                
                // Simulación de los que ya están publicados (Basado en tu subida de hoy)
                const publishedIds = [1]; 
                
                document.getElementById('count-promises').innerText = data.length - publishedIds.length;
                document.getElementById('count-landscapes').innerText = 116 - publishedIds.length;

                data.forEach(item => {
                    const isPub = publishedIds.includes(item.id);
                    const div = document.createElement('div');
                    div.className = 'entry-item';
                    div.onclick = () => startProduction(item);
                    div.innerHTML = `
                        <div class="entry-info">
                            <h4>${item.reflection_title}</h4>
                            <p>${item.verse_citation}</p>
                        </div>
                        <div class="pub-status">VIDEOS: ${isPub ? 1 : 0}</div>
                    `;
                    list.appendChild(div);
                });
            } catch (e) {
                console.error(e);
            }
        }

        function startProduction(item) {
            const screen = document.getElementById('production-screen');
            const sub = document.getElementById('engine-sub');
            screen.style.display = 'flex';
            
            const steps = ["Extrayendo Teología", "Sincronizando Melodía", "Renderizando Master", "Publicando en YouTube"];
            let i = 0;
            const timer = setInterval(() => {
                if(i >= steps.length) {
                    clearInterval(timer);
                    sub.innerText = "¡PROCESO FINALIZADO!";
                    setTimeout(() => screen.style.display = 'none', 1500);
                } else {
                    sub.innerText = steps[i];
                    i++;
                }
            }, 1500);
        }

        window.onload = initApp;
    </script>
</body>
</html>
