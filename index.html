<html lang="es">

    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>MusiChris Soul | Master Control</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="assets/app_icon.png">
    <meta name="theme-color" content="#000000">

            --bg-deep: #000000;
            --accent-gold: #D4AF37;
            --gold-light: #F1D592;
            --glass: rgba(255, 255, 255, 0.05);
            --gold-glow: rgba(212, 175, 55, 0.4);
            --safe-top: env(safe-area-inset-top);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-deep);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            overflow-x: hidden;
        }

        .smoke-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: #000 url('assets/fondo_app.gif') center center no-repeat;
            background-size: cover;
            opacity: 0.5;
        }

        .container {
            width: 100%;
            max-width: 500px;
            padding: calc(var(--safe-top) + 1.5rem) 1.2rem 3rem;
            position: relative;
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
            position: relative;
        }

            background-size: cover;
            background-position: center;
            border: 2px solid var(--accent-gold);
            box-shadow: 0 0 25px var(--gold-glow);
        }

        .btn-control-sync {
            position: absolute;
            top: 0; right: 0;
            width: 44px; height: 44px;
            background: var(--glass);
            border: 2px solid var(--accent-gold);
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            color: var(--accent-gold);
            box-shadow: 0 0 15px var(--gold-glow);
            backdrop-filter: blur(10px);
            z-index: 110;
        }

        .btn-control-sync.rotating { animation: spin 0.8s ease-in-out; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        h1 { font-family: 'Playfair Display', serif; font-size: 2.4rem; margin: 0; letter-spacing: -0.5px; }
        .gold-glow { color: var(--accent-gold); text-shadow: 0 0 15px var(--gold-glow); }
        .tag-v { font-size: 0.6rem; letter-spacing: 4px; color: var(--accent-gold); margin-top: 0.4rem; font-weight: 800; opacity: 0.7; }

        .mission-panel { display: flex; gap: 10px; margin-bottom: 2rem; }
        .m-card { flex: 1; background: rgba(20, 20, 20, 0.8); backdrop-filter: blur(20px); padding: 1.2rem; border-radius: 20px; border: 1px solid rgba(212, 175, 55, 0.2); text-align: center; }
        .m-card .val { display: block; font-size: 1.8rem; font-weight: 900; color: var(--accent-gold); }
        .m-card .lab { font-size: 0.55rem; text-transform: uppercase; letter-spacing: 1.5px; opacity: 0.6; font-weight: 700; }

        .catalog-box { background: rgba(0,0,0,0.8); backdrop-filter: blur(30px); border-radius: 28px; padding: 1.5rem; border: 1px solid rgba(255,255,255,0.05); }
        .catalog-list { display: flex; flex-direction: column; gap: 12px; max-height: 450px; overflow-y: auto; padding-right: 4px; }
        .item-row { background: rgba(255,255,255,0.03); padding: 1.2rem; border-radius: 18px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255,255,255,0.02); }
        .item-info h4 { margin: 0; font-size: 1rem; color: var(--accent-gold); }
        .item-info p { margin: 4px 0 0; font-size: 0.75rem; opacity: 0.5; }
        .pub-tag { font-size: 0.6rem; background: #111; border: 1px solid var(--accent-gold); color: var(--accent-gold); padding: 4px 8px; border-radius: 8px; font-weight: 900; }

        #engine-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 2000; display: none; justify-content: center; align-items: center; flex-direction: column; padding: 2rem; text-align: center; }
        .ring { width: 60px; height: 60px; border: 4px solid var(--glass); border-top-color: var(--accent-gold); border-radius: 50%; animation: spin 1s infinite linear; margin-bottom: 2rem; }
    </style>
</head>
<body>
    <div class="smoke-container"></div>
    <div class="container">
        <header>
            <div id="sync-trigger" class="btn-control-sync" onclick="syncAll()">🔄</div>
            <div class="logo-sphere"></div>
            <h1>MusiChris <span class="gold-glow">Soul</span></h1>
            <div class="tag-v">MASTER INTEGRITY v40.3</div>
        </header>

        <div class="mission-panel">
            <div class="m-card"><span class="val" id="p-count">92</span><span class="lab">Promesas por publicar</span></div>
            <div class="m-card"><span class="val" id="l-count">115</span><span class="lab">Paisajes disponibles</span></div>
        </div>

        <section class="catalog-box">
            <h2 style="font-family: 'Playfair Display', serif; font-size: 1.4rem; margin: 0 0 1.2rem 0; font-style: italic;">Bitácora de Publicación</h2>
            <div class="catalog-list" id="list-render"></div>
        </section>
    </div>

    <div id="engine-overlay">
        <div class="ring"></div>
        <h2 style="font-family: 'Playfair Display', serif; color: var(--accent-gold);">Procesando Ingeniería</h2>
        <p id="engine-text" style="font-size: 0.7rem; opacity: 0.5; text-transform: uppercase;">Iniciando Motor FFmpeg Soul...</p>
    </div>

    <script>
        const DB = "data/promises_developed.json";

        async function syncAll() {
            const btn = document.getElementById('sync-trigger');
            btn.classList.add('rotating');
            await init();
            setTimeout(() => btn.classList.remove('rotating'), 800);
        }

        async function init() {
            try {
                const res = await fetch(DB + '?v=' + Date.now());
                const data = await res.json();
                const list = document.getElementById('list-render');
                list.innerHTML = '';
                const pubIds = [1]; 
                document.getElementById('p-count').innerText = data.length - pubIds.length;
                document.getElementById('l-count').innerText = 116 - pubIds.length;

                data.forEach(item => {
                    const isPub = pubIds.includes(item.id);
                    const div = document.createElement('div');
                    div.className = 'item-row';
                    div.onclick = () => runProduce(item);
                    div.innerHTML = `<div class="item-info"><h4>${item.reflection_title}</h4><p>${item.verse_citation}</p></div><div class="pub-tag">PUBLICA: ${isPub ? 1 : 0}</div>`;
                    list.appendChild(div);
                });
            } catch (e) { console.error(e); }
        }

        function runProduce(item) {
            const overlay = document.getElementById('engine-overlay');
            const txt = document.getElementById('engine-text');
            overlay.style.display = 'flex';
            const steps = ["Extrayendo Biblia", "Mezclando Melodía", "Generando Cinematic", "Publicando en YouTube"];
            let i = 0;
            const t = setInterval(() => {
                if(i >= steps.length) { clearInterval(t); txt.innerText = "¡MISIÓN CUMPLIDA!"; setTimeout(() => overlay.style.display = 'none', 1500); }
                else { txt.innerText = steps[i]; i++; }
            }, 1500);
        }
        window.onload = init;
    </script>
</body>
</html>
