<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>MusiChris Soul | Master Control</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="assets/app_icon.png">
    <meta name="theme-color" content="#000000">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #000000;
            --accent-gold: #D4AF37;
            --gold-light: #F1D592;
            --glass: rgba(255, 255, 255, 0.05);
            --gold-glow: rgba(212, 175, 55, 0.4);
            --safe-top: env(safe-area-inset-top);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-deep);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            overflow-x: hidden;
        }

        .smoke-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: #000 url('assets/fondo_app.gif') center center no-repeat;
            background-size: cover;
            opacity: 0.6;
        }

        .container {
            width: 100%;
            max-width: 500px;
            padding: calc(var(--safe-top) + 2rem) 1.5rem 3rem;
            position: relative;
        }

        /* --- HEADER PREMIUM --- */
        header {
            text-align: center;
            margin-bottom: 2.5rem;
            position: relative;
        }

        .btn-sync-circle {
            position: absolute;
            top: -10px;
            right: 0;
            width: 48px;
            height: 48px;
            background: var(--glass);
            border: 1px solid var(--accent-gold);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--accent-gold);
            box-shadow: 0 0 15px var(--gold-glow);
            backdrop-filter: blur(10px);
            cursor: pointer;
            z-index: 100;
        }

        .app-icon {
            width: 90px;
            height: 90px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8), 0 0 20px var(--gold-glow);
            margin-bottom: 1.5rem;
            border: 1px solid rgba(212, 175, 55, 0.3);
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.4rem;
            margin: 0;
            letter-spacing: -1px;
        }

        .gold-text {
            color: var(--accent-gold);
            text-shadow: 0 0 15px var(--gold-glow);
        }

        .version-badge {
            font-size: 0.65rem;
            letter-spacing: 5px;
            color: var(--accent-gold);
            margin-top: 0.5rem;
            font-weight: 800;
            opacity: 0.8;
        }

        /* --- STATS BAR --- */
        .stats-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 2rem;
        }

        .stat-item {
            flex: 1;
            background: var(--glass);
            backdrop-filter: blur(20px);
            padding: 1rem;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.05);
            text-align: center;
        }

        .stat-v {
            display: block;
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--accent-gold);
        }

        .stat-l {
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.5;
            font-weight: 700;
        }

        /* --- CATALOGUE --- */
        .catalog-card {
            background: var(--glass);
            backdrop-filter: blur(30px);
            border-radius: 32px;
            padding: 1.5rem;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .catalog-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .catalog-header h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            margin: 0;
            font-style: italic;
        }

        .promise-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 400px;
            overflow-y: auto;
            padding-right: 5px;
        }

        .promise-item {
            background: rgba(255,255,255,0.03);
            padding: 1.2rem;
            border-radius: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid transparent;
            transition: all 0.3s ease;
        }

        .promise-item:active {
            transform: scale(0.97);
            background: rgba(212, 175, 55, 0.1);
        }

        .promise-info h4 {
            margin: 0 0 4px 0;
            font-size: 1rem;
            color: var(--accent-gold);
        }

        .promise-info p {
            margin: 0;
            font-size: 0.75rem;
            opacity: 0.6;
            font-weight: 300;
        }

        .mood-tag {
            font-size: 0.6rem;
            background: rgba(212, 175, 55, 0.1);
            color: var(--accent-gold);
            padding: 4px 10px;
            border-radius: 8px;
            white-space: nowrap;
            margin-left: 10px;
            max-width: 100px;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* --- TERMINAL --- */
        #production-terminal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(20px);
            z-index: 1000;
            display: none;
            padding: 2rem;
            justify-content: center;
            align-items: center;
        }

        .terminal-box {
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .progress-bar {
            width: 100%; height: 4px;
            background: rgba(212, 175, 55, 0.1);
            border-radius: 10px;
            margin: 2rem 0;
            overflow: hidden;
        }

        .progress-fill {
            width: 0%; height: 100%;
            background: var(--accent-gold);
            box-shadow: 0 0 15px var(--accent-gold);
            transition: width 0.3s ease;
        }

        .step {
            display: flex; gap: 12px; align-items: center;
            margin-bottom: 15px; font-size: 0.8rem; opacity: 0.3;
        }

        .step.active { opacity: 1; color: var(--accent-gold); }
        .step.done { opacity: 1; color: #10b981; }

        .step-dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; }

        /* --- SCROLLBAR --- */
        .promise-list::-webkit-scrollbar { width: 3px; }
        .promise-list::-webkit-scrollbar-thumb { background: var(--accent-gold); border-radius: 10px; }
    </style>
</head>
<body>
    <div class="smoke-container"></div>

    <div class="container">
        <header>
            <div class="btn-sync-circle" onclick="location.reload()">🔄</div>
            <img src="assets/app_icon.png" alt="Icon" class="app-icon">
            <h1>MusiChris <span class="gold-text">Soul</span></h1>
            <div class="version-badge">VERSION 40.0.0</div>
        </header>

        <div class="stats-bar">
            <div class="stat-item">
                <span class="stat-v" id="stat-promises">0</span>
                <span class="stat-l">Promesas</span>
            </div>
            <div class="stat-item">
                <span class="stat-v" id="stat-landscapes">0</span>
                <span class="stat-l">Paisajes</span>
            </div>
        </div>

        <section class="catalog-card">
            <div class="catalog-header">
                <h2>Catálogo de Gloria</h2>
            </div>
            <div class="promise-list" id="promise-list">
                <!-- Dinámico -->
            </div>
        </section>
    </div>

    <div id="production-terminal">
        <div class="terminal-box">
            <h2 style="font-family: 'Playfair Display', serif; color: var(--accent-gold);">Procesando</h2>
            <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
            <div class="terminal-steps">
                <div class="step" id="step-1"><div class="step-dot"></div> Ingesta Teológica</div>
                <div class="step" id="step-2"><div class="step-dot"></div> Sincronía Secuencial</div>
                <div class="step" id="step-3"><div class="step-dot"></div> Renderizado Master</div>
                <div class="step" id="step-4"><div class="step-dot"></div> Publicación Sentry</div>
            </div>
            <p id="terminal-status" style="font-size: 0.6rem; opacity: 0.5; text-transform: uppercase;">Iniciando Motor...</p>
        </div>
    </div>

    <script>
        // Simulamos la carga desde el JSON que creamos antes
        const SOUL_DATABASE_REMOTE = "data/promises_developed.json";

        async function loadContent() {
            try {
                const response = await fetch(SOUL_DATABASE_REMOTE);
                const data = await response.json();
                
                document.getElementById('stat-promises').innerText = data.length;
                
                const list = document.getElementById('promise-list');
                list.innerHTML = '';
                
                data.forEach(item => {
                    const el = document.createElement('div');
                    el.className = 'promise-item';
                    el.onclick = () => produceVideo(item);
                    el.innerHTML = `
                        <div class="promise-info">
                            <h4>${item.reflection_title || item.title}</h4>
                            <p>${item.verse_citation || item.verse}</p>
                        </div>
                        <div class="mood-tag">${item.id}</div>
                    `;
                    list.appendChild(el);
                });

                // Simulación de paisajes (esto vendría de una API real en prod)
                document.getElementById('stat-landscapes').innerText = '116';

            } catch (e) {
                console.error("Error cargando base de datos:", e);
                // Fallback si no hay JSON
                document.getElementById('promise-list').innerHTML = '<p style="opacity:0.5; text-align:center;">Error al conectar con la BD.</p>';
            }
        }

        function produceVideo(item) {
            const terminal = document.getElementById('production-terminal');
            terminal.style.display = 'flex';
            
            let progress = 0;
            const fill = document.getElementById('progress-fill');
            const status = document.getElementById('terminal-status');

            const runStep = (stepId, text, time) => {
                return new Promise(resolve => {
                    document.getElementById(stepId).className = 'step active';
                    status.innerText = text;
                    setTimeout(() => {
                        document.getElementById(stepId).className = 'step done';
                        progress += 25;
                        fill.style.width = progress + '%';
                        resolve();
                    }, time);
                });
            };

            // Simulación de flujo de producción
            (async () => {
                await runStep('step-1', "Descargando Audio y Verso...", 1500);
                await runStep('step-2', "Eligiendo Paisaje Ministerial...", 2000);
                await runStep('step-3', "Renderizando con FFmpeg Master...", 4000);
                await runStep('step-4', "Finalizando en YouTube...", 1500);
                
                status.innerText = "¡Vídeo Publicado!";
                setTimeout(() => { 
                    terminal.style.display = 'none';
                    // Reset steps
                    document.querySelectorAll('.step').forEach(s => s.className = 'step');
                    fill.style.width = '0%';
                }, 2000);
            })();
        }

        window.onload = loadContent;
    </script>
</body>
</html>
