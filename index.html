<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>MusiChris Soul | Master Remote</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="assets/app_icon.png">
    <meta name="theme-color" content="#000000">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #000000;
            --accent-gold: #D4AF37;
            --gold-light: #F1D592;
            --glass: rgba(255, 255, 255, 0.05);
            --gold-glow: rgba(212, 175, 55, 0.4);
            --safe-top: env(safe-area-inset-top);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-deep);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            overflow-x: hidden;
            -webkit-user-select: none;
        }

        .smoke-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: #000 url('assets/fondo_app.gif') center center no-repeat;
            background-size: cover;
            opacity: 0.4;
        }

        .container {
            width: 100%;
            max-width: 500px;
            padding: calc(var(--safe-top) + 2rem) 1.5rem 4rem;
            position: relative;
        }

        header {
            text-align: center;
            margin-bottom: 2.5rem;
            position: relative;
        }

        .refresh-btn {
            position: absolute;
            top: -10px; right: 0;
            width: 48px; height: 48px;
            background: var(--glass);
            border: 2px solid var(--accent-gold);
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            color: var(--accent-gold);
            box-shadow: 0 0 15px var(--gold-glow);
            backdrop-filter: blur(10px);
            z-index: 100;
        }
        .refresh-btn.active { animation: spin 0.8s ease-in-out; }
        @keyframes spin { from {transform:rotate(0deg)} to {transform:rotate(360deg)} }

        .app-logo-box {
            width: 95px; height: 95px;
            margin: 0 auto 1.5rem;
            border-radius: 26px;
            background: #000;
            border: 1.5px solid var(--accent-gold);
            box-shadow: 0 0 35px var(--gold-glow);
            overflow: hidden;
        }
        .app-logo-box img { width: 100%; height: 100%; object-fit: cover; }

        h1 { font-family: 'Playfair Display', serif; font-size: 2.5rem; margin: 0; letter-spacing: -1px; }
        .gold { color: var(--accent-gold); text-shadow: 0 0 15px var(--gold-glow); }
        .sub-tag { font-size: 0.6rem; letter-spacing: 4px; color: var(--accent-gold); margin-top: 0.5rem; font-weight: 800; opacity: 0.7; border-top: 1px solid rgba(212,175,55,0.3); display: inline-block; padding-top: 4px; }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 2rem; }
        .stat-box { background: var(--glass); backdrop-filter: blur(25px); padding: 1.2rem; border-radius: 22px; border: 1px solid rgba(212, 175, 55, 0.15); text-align: center; }
        .stat-box .val { display: block; font-size: 1.8rem; font-weight: 900; color: var(--accent-gold); }
        .stat-box .lab { font-size: 0.55rem; text-transform: uppercase; letter-spacing: 1px; opacity: 0.5; font-weight: 700; }

        .main-card { background: rgba(0,0,0,0.85); backdrop-filter: blur(35px); border-radius: 35px; padding: 1.5rem; border: 1px solid rgba(255,255,255,0.06); box-shadow: 0 15px 45px rgba(0,0,0,0.6); }
        .list-flow { display: flex; flex-direction: column; gap: 12px; max-height: 480px; overflow-y: auto; padding-right: 6px; }
        
        .item-card { 
            background: rgba(255,255,255,0.04); padding: 1.25rem; border-radius: 22px; 
            display: flex; justify-content: space-between; align-items: center; 
            border: 1px solid transparent; transition: 0.3s;
        }
        .item-card:active { transform: scale(0.97); background: rgba(212, 175, 55, 0.08); border-color: var(--accent-gold); }

        .info h4 { margin: 0 0 5px 0; font-size: 1.05rem; color: var(--accent-gold); }
        .info p { margin: 0; font-size: 0.8rem; opacity: 0.45; font-style: italic; }
        .badge-pub { font-size: 0.65rem; background: rgba(212, 175, 55, 0.1); color: var(--accent-gold); padding: 5px 12px; border-radius: 10px; font-weight: 900; border: 1px solid rgba(212,175,55,0.2); }

        /* PRODUCTION ENGINE */
        #production-hub {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.98); z-index: 2000;
            display: none; justify-content: center; align-items: center; flex-direction: column; padding: 2rem;
        }
        .loader { width: 70px; height: 70px; border: 5px solid var(--glass); border-top: 5px solid var(--accent-gold); border-radius: 50%; animation: spin 1.2s infinite linear; box-shadow: 0 0 20px var(--gold-glow); }
        #log { margin-top: 2rem; font-size: 0.65rem; color: var(--accent-gold); letter-spacing: 2px; text-transform: uppercase; font-weight: 600; }
    </style>
</head>
<body>
    <div class="smoke-bg"></div>
    <div class="container">
        <header>
            <div id="sync-b" class="refresh-btn" onclick="sync()">🔄</div>
            <div class="app-logo-box">
                <img src="assets/app_icon_fixed.png" alt="Soul" onerror="this.src='assets/app_icon.png'">
            </div>
            <h1>MusiChris <span class="gold">Soul</span></h1>
            <div class="sub-tag">MASTER REMOTE v40.5</div>
        </header>

        <div class="stats-grid">
            <div class="stat-box"><span class="val" id="p-val">--</span><span class="lab">Promesas Pendientes</span></div>
            <div class="stat-box"><span class="val" id="l-val">115</span><span class="lab">Paisajes Libres</span></div>
        </div>

        <section class="main-card">
            <h2 style="font-family:'Playfair Display'; font-size:1.4rem; margin:0 0 1.2rem 0; font-style:italic;">Control de Publicación</h2>
            <div class="list-flow" id="content-list"></div>
        </section>
    </div>

    <div id="production-hub">
        <div class="loader"></div>
        <h2 style="font-family:'Playfair Display'; color:var(--accent-gold); margin-top:2rem;">Desplegando Misión</h2>
        <p id="log">Conectando con Servidor Local...</p>
    </div>

    <script>
        async function sync() {
            document.getElementById('sync-b').classList.add('active');
            await load();
            setTimeout(() => document.getElementById('sync-b').classList.remove('active'), 800);
        }

        async function load() {
            try {
                const r = await fetch('data/promises_developed.json?c=' + Date.now());
                const data = await r.json();
                const list = document.getElementById('content-list');
                const pubIds = [1];
                document.getElementById('p-val').innerText = data.length - pubIds.length;
                
                list.innerHTML = '';
                data.forEach(item => {
                    const isPub = pubIds.includes(item.id);
                    const div = document.createElement('div');
                    div.className = 'item-card';
                    div.onclick = () => produce(item);
                    div.innerHTML = `
                        <div class="info"><h4>${item.reflection_title}</h4><p>${item.verse_citation}</p></div>
                        <div class="badge-pub">VIDEOS: ${isPub ? 1 : 0}</div>
                    `;
                    list.appendChild(div);
                });
            } catch (e) { console.error(e); }
        }

        function produce(item) {
            document.getElementById('production-hub').style.display = 'flex';
            const log = document.getElementById('log');
            const steps = ["Enviando Señal a Mac", "Validando Teología", "Iniciando Renderizado", "Subiendo a YouTube"];
            let i = 0;
            const timer = setInterval(() => {
                if(i >= steps.length) {
                    clearInterval(timer);
                    log.innerText = "¡PRODUCCIÓN EN CURSO!";
                    setTimeout(() => document.getElementById('production-hub').style.display = 'none', 1500);
                } else {
                    log.innerText = steps[i];
                    i++;
                }
            }, 1500);

            // AQUÍ DISPARAREMOS LA ORDEN REAL A TELEGRAM EN EL SIGUIENTE PASO
        }
        window.onload = load;
    </script>
</body>
</html>
