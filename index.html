<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>MusiChris Soul | Master Control</title>
    <link rel="manifest" href="./manifest.json">
    <link rel="apple-touch-icon" href="./assets/app_icon.png">
    <meta name="theme-color" content="#000000">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #000000;
            --accent-gold: #D4AF37;
            --gold-light: #F1D592;
            --glass: rgba(255, 255, 255, 0.05);
            --gold-glow: rgba(212, 175, 55, 0.4);
            --safe-top: env(safe-area-inset-top);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-deep);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            overflow-x: hidden;
        }

        .smoke-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: #000 url('./assets/fondo_app.gif') center center no-repeat;
            background-size: cover;
            opacity: 0.6;
        }

        .container {
            width: 100%;
            max-width: 500px;
            padding: calc(var(--safe-top) + 2rem) 1.5rem 3rem;
            position: relative;
        }

        header {
            text-align: center;
            margin-bottom: 2.5rem;
            position: relative;
        }

        .btn-sync-circle {
            position: absolute;
            top: -10px;
            right: 0;
            width: 48px;
            height: 48px;
            background: var(--glass);
            border: 1px solid var(--accent-gold);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--accent-gold);
            box-shadow: 0 0 15px var(--gold-glow);
            backdrop-filter: blur(10px);
            cursor: pointer;
            z-index: 100;
            transition: transform 0.6s ease;
        }

        .btn-sync-circle.rotating { transform: rotate(360deg); }

        .logo-wrap {
            width: 90px;
            height: 90px;
            margin: 0 auto 1.5rem;
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid rgba(212, 175, 55, 0.5);
            box-shadow: 0 0 30px var(--gold-glow);
            background: #000;
        }

        .app-icon {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.4rem;
            margin: 0;
            letter-spacing: -1px;
        }

        .gold-text {
            color: var(--accent-gold);
            text-shadow: 0 0 15px var(--gold-glow);
        }

        .version-badge {
            font-size: 0.65rem;
            letter-spacing: 5px;
            color: var(--accent-gold);
            margin-top: 0.5rem;
            font-weight: 800;
            opacity: 0.8;
        }

        .stats-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 2rem;
        }

        .stat-item {
            flex: 1;
            background: var(--glass);
            backdrop-filter: blur(20px);
            padding: 1rem;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.05);
            text-align: center;
        }

        .stat-v {
            display: block;
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--accent-gold);
        }

        .stat-l {
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.5;
            font-weight: 700;
        }

        .catalog-card {
            background: var(--glass);
            backdrop-filter: blur(30px);
            border-radius: 32px;
            padding: 1.5rem;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .promise-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 500px;
            overflow-y: auto;
            padding-right: 5px;
        }

        .promise-item {
            background: rgba(255,255,255,0.03);
            padding: 1.2rem;
            border-radius: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid transparent;
            transition: all 0.3s ease;
        }

        .promise-info { flex: 1; overflow: hidden; }

        .promise-info h4 {
            margin: 0 0 4px 0;
            font-size: 0.95rem;
            color: var(--accent-gold);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .promise-info p {
            margin: 0;
            font-size: 0.75rem;
            opacity: 0.5;
        }

        .mood-tag {
            font-size: 0.65rem;
            background: rgba(212, 175, 55, 0.15);
            color: var(--accent-gold);
            padding: 5px 12px;
            border-radius: 10px;
            font-weight: 800;
            margin-left: 15px;
            min-width: 40px;
            text-align: center;
            border: 1px solid rgba(212, 175, 55, 0.2);
        }

        #production-terminal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(20px);
            z-index: 1000;
            display: none;
            padding: 2rem;
            justify-content: center;
            align-items: center;
        }

        .terminal-box { width: 100%; max-width: 400px; text-align: center; }
        .progress-bar { width: 100%; height: 4px; background: rgba(212, 175, 55, 0.1); border-radius: 10px; margin: 2rem 0; overflow: hidden; }
        .progress-fill { width: 0%; height: 100%; background: var(--accent-gold); box-shadow: 0 0 15px var(--accent-gold); transition: width 0.3s ease; }
        .step { display: flex; gap: 12px; align-items: center; margin-bottom: 15px; font-size: 0.8rem; opacity: 0.3; }
        .step.active { opacity: 1; color: var(--accent-gold); }
        .step.done { opacity: 1; color: #10b981; }
        .step-dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; }
        .promise-list::-webkit-scrollbar { width: 3px; }
        .promise-list::-webkit-scrollbar-thumb { background: var(--accent-gold); border-radius: 10px; }
    </style>
</head>
<body>
    <div class="smoke-container"></div>
    <div class="container">
        <header>
            <div id="sync-btn" class="btn-sync-circle" onclick="syncApp()">🔄</div>
            <div class="logo-wrap">
                <img src="./assets/app_icon.png" alt="MusiChris Soul" class="app-icon" onerror="this.src='https://res.cloudinary.com/dveqs8f3n/image/upload/v1776689378/app_icon_v2.png'">
            </div>
            <h1>MusiChris <span class="gold-text">Soul</span></h1>
            <div class="version-badge">VERSION 40.0.0</div>
        </header>

        <div class="stats-bar">
            <div class="stat-item"><span class="stat-v" id="stat-promises">0</span><span class="stat-label stat-l">Promesas</span></div>
            <div class="stat-item"><span class="stat-v" id="stat-landscapes">116</span><span class="stat-label stat-l">Paisajes</span></div>
        </div>

        <section class="catalog-card">
            <h2 style="font-family: 'Playfair Display', serif; font-style: italic; margin: 0 0 1.5rem 0; font-size: 1.4rem;">Catálogo de Gloria</h2>
            <div class="promise-list" id="promise-list"></div>
        </section>
    </div>

    <div id="production-terminal">
        <div class="terminal-box">
            <h2 style="font-family: 'Playfair Display', serif; color: var(--accent-gold);">Procesando</h2>
            <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
            <div class="terminal-steps">
                <div class="step" id="step-1"><div class="step-dot"></div> Ingesta Teológica</div>
                <div class="step" id="step-2"><div class="step-dot"></div> Sincronía Secuencial</div>
                <div class="step" id="step-3"><div class="step-dot"></div> Renderizado Master</div>
                <div class="step" id="step-4"><div class="step-dot"></div> Publicación Sentry</div>
            </div>
            <p id="terminal-status" style="font-size: 0.6rem; opacity: 0.5; text-transform: uppercase;">Iniciando Motor...</p>
        </div>
    </div>

    <script>
        async function syncApp() {
            const btn = document.getElementById('sync-btn');
            btn.classList.add('rotating');
            await loadContent();
            setTimeout(() => btn.classList.remove('rotating'), 1000);
        }

        async function loadContent() {
            try {
                const response = await fetch('./data/promises_developed.json');
                const data = await response.json();
                document.getElementById('stat-promises').innerText = data.length;
                const list = document.getElementById('promise-list');
                list.innerHTML = '';
                data.forEach(item => {
                    const el = document.createElement('div');
                    el.className = 'promise-item';
                    el.onclick = () => produceVideo(item);
                    el.innerHTML = `
                        <div class="promise-info">
                            <h4>${item.reflection_title || item.title}</h4>
                            <p>${item.verse_citation || item.verse}</p>
                        </div>
                        <div class="mood-tag">${item.id}</div>
                    `;
                    list.appendChild(el);
                });
            } catch (e) {
                console.error("Error:", e);
                document.getElementById('promise-list').innerHTML = '<p style="opacity:0.5; text-align:center;">Cargando catálogo maestro...</p>';
            }
        }

        function produceVideo(item) {
            document.getElementById('production-terminal').style.display = 'flex';
            let progress = 0;
            const fill = document.getElementById('progress-fill');
            const status = document.getElementById('terminal-status');
            const runStep = (stepId, text, time) => new Promise(resolve => {
                document.getElementById(stepId).className = 'step active';
                status.innerText = text;
                setTimeout(() => {
                    document.getElementById(stepId).className = 'step done';
                    progress += 25;
                    fill.style.width = progress + '%';
                    resolve();
                }, time);
            });
            (async () => {
                await runStep('step-1', "Descargando Audio y Verso...", 1500);
                await runStep('step-2', "Eligiendo Paisaje Ministerial...", 2000);
                await runStep('step-3', "Renderizado con FFmpeg Master...", 4000);
                await runStep('step-4', "Finalizando en YouTube...", 1500);
                status.innerText = "¡Vídeo Publicado!";
                setTimeout(() => {
                    document.getElementById('production-terminal').style.display = 'none';
                    document.querySelectorAll('.step').forEach(s => s.className = 'step');
                    fill.style.width = '0%';
                }, 2000);
            })();
        }
        window.onload = loadContent;
    </script>
</body>
</html>
